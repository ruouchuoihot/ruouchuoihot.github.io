title: "ruouchuoihot's blog"
description: "Writeups, kiến thức Blue Team, SOC & Cyber Defense"
url: "https://ruouchuoihot.github.io"
baseurl: ""

# Author
author:
  name: "ruouchuoihot"
  bio: "CTF Player | Security Researcher"
  github: "ruouchuoihot"

# Certifications
# Add your certifications here. Example:
# certifications:
#   - name: "CompTIA Security+"
#     issuer: "CompTIA"
#     issued: "2026"
#     note: "Badge on Credly"
#     url: "https://www.credly.com/badges/your-badge-id"
certifications: []

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  writeups:
    output: true
    permalink: /writeups/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "writeups"
    values:
      layout: "writeup"

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .gitignore
