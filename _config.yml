title: "ruouchuoihot's blog"
description: "Writeups, kiến thức Blue Team, SOC & Cyber Defense"
url: "https://ruouchuoihot.github.io"
baseurl: ""

# Author
author:
  name: "ruouchuoihot"
  bio: "CTF Player | Security Researcher"
  github: "ruouchuoihot"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  writeups:
    output: true
    permalink: /writeups/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "writeups"
    values:
      layout: "writeup"

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .gitignore
